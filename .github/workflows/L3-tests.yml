name: L3 CRL mTLS Integration Tests

# RDK-61158: End-to-end L3 test suite.
#
# Mirrors the structure of L2-tests.yml but requires both mock-xconf and
# native-platform containers because L3 makes real TLS connections.
#
# Key design decisions:
#   - rdk-cert-config is checked out to a 'rdk-cert-config/' subdirectory so
#     that the workspace root is the shared volume parent.  This matches the
#     fallback path in mock-xconf/certs.sh:
#       /mnt/L2_CONTAINER_SHARED_VOLUME/rdk-cert-config/test/cert-scripts/
#   - mock-xconf and native-platform are built from the docker-device-mgt-
#     service-test develop branch so the CRL-L3 server code is present.
#   - Both containers start with ENABLE_CRL_L3=true.
#   - run_l3.sh (in this repo) is exec'd inside native-platform after both
#     containers are running.

on:
  pull_request:
    branches: [ develop, main, topic/RDK-61158, topic/RDK-61158_old, topic/RDK-61158_oldL3 ]

env:
  AUTOMATICS_UNAME: ${{ secrets.AUTOMATICS_UNAME }}
  AUTOMATICS_PASSCODE: ${{ secrets.AUTOMATICS_PASSCODE }}

jobs:
  execute-L3-tests-on-pr:
    name: Execute L3 CRL/mTLS test suite in two-container environment
    runs-on: ubuntu-latest

    services:
      # Local registry used to push/pull freshly built images within the job.
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver-opts: network=host
          install: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Checkout: rdk-cert-config into a subdirectory ──────────────────────
      # Placing it at 'rdk-cert-config/' means the workspace root becomes the
      # shared-volume parent, so the fallback path in certs.sh resolves to:
      #   /mnt/L2_CONTAINER_SHARED_VOLUME/rdk-cert-config/test/cert-scripts/
      - name: Checkout rdk-cert-config (this repo)
        uses: actions/checkout@v4
        with:
          path: 'rdk-cert-config'

      # ── Checkout: docker-device-mgt-service-test for image builds ──────────
      # Uses Lasya-Prakarsha-D-V fork at topic/RDK-61158_old which carries the
      # CRL-L3 server code (crl-mtls-server.js, crl-control.js, updated
      # certs.sh, entrypoint.sh, compose.yaml port exposure).
      # Change repository to 'rdkcentral/docker-device-mgt-service-test' once
      # this branch is merged into the upstream develop.
      - name: Checkout docker-device-mgt-service-test
        uses: actions/checkout@v4
        with:
          repository: 'Lasya-Prakarsha-D-V/docker-device-mgt-service-test'
          ref: 'topic/RDK-61158_old'
          path: 'device-management-service'

      # ── Checkout: native-platform build dependencies ────────────────────────
      - name: Checkout rdk_logger
        uses: actions/checkout@v4
        with:
          repository: 'rdkcentral/rdk_logger'
          ref: 'v3.1.0'
          path: 'device-management-service/native-platform/rdk_logger'

      - name: Checkout WebconfigFramework
        uses: actions/checkout@v4
        with:
          repository: 'rdkcentral/WebconfigFramework'
          ref: 'IMPORT_INITIAL_develop'
          path: 'device-management-service/native-platform/WebconfigFramework'

      - name: Checkout libSyscallWrapper
        uses: actions/checkout@v4
        with:
          repository: 'rdkcentral/libSyscallWrapper'
          ref: 'IMPORT_INITIAL_develop'
          path: 'device-management-service/native-platform/libSyscallWrapper'

      - name: Checkout common_utilities
        uses: actions/checkout@v4
        with:
          repository: 'rdkcentral/common_utilities'
          ref: '1.5.4'
          path: 'device-management-service/native-platform/common_utilities'

      - name: Checkout tr69hostif
        uses: actions/checkout@v4
        with:
          repository: 'rdkcentral/tr69hostif'
          ref: '1.4.4'
          path: 'device-management-service/native-platform/tr69hostif'

      # ── Build images ────────────────────────────────────────────────────────
      # Build mock-xconf with the CRL-L3 server code (crl-mtls-server.js,
      # crl-control.js, updated certs.sh and entrypoint.sh).
      - name: Build mock-xconf image (CRL-L3 enabled)
        uses: docker/build-push-action@v4
        with:
          platforms: linux/amd64
          context: device-management-service/mock-xconf
          push: true
          tags: localhost:5000/mockxconf:l3test
          load: false

      - name: Build native-platform image
        uses: docker/build-push-action@v4
        with:
          context: device-management-service/native-platform
          platforms: linux/amd64
          push: true
          tags: localhost:5000/native-platform:l3test
          load: false

      # ── Start containers ────────────────────────────────────────────────────
      # mock-xconf must start first; native-platform/certs.sh polls the shared
      # volume for cert files that mock-xconf exports during its startup.
      - name: Start mock-xconf container (ENABLE_CRL_L3=true)
        run: |
          docker run -d \
            --name mockxconf \
            -p 50061:50061 \
            -p 50062:50062 \
            -p 50063:50063 \
            -p 50064:50064 \
            -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME \
            -e ENABLE_CRL_L3=true \
            localhost:5000/mockxconf:l3test

      - name: Start native-platform container (ENABLE_CRL_L3=true)
        run: |
          docker run -d \
            --name native-platform \
            --link mockxconf \
            -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME \
            -e ENABLE_CRL_L3=true \
            localhost:5000/native-platform:l3test

      # ── Run tests ───────────────────────────────────────────────────────────
      # run_l3.sh (inside the container) polls for cert readiness before
      # invoking pytest, so no explicit sleep is needed here.
      - name: Run L3 test suite inside native-platform
        run: |
          docker exec -i native-platform /bin/bash -c \
            "cd /mnt/L2_CONTAINER_SHARED_VOLUME/rdk-cert-config && \
             export LD_LIBRARY_PATH=\$LD_LIBRARY_PATH:/usr/lib/x86_64-linux-gnu:/usr/local/lib: && \
             sh run_l3.sh"

      # ── Collect results ─────────────────────────────────────────────────────
      - name: Copy L3 test results to runner
        if: always()
        run: |
          mkdir -p /tmp/L3_TEST_RESULTS
          docker cp native-platform:/tmp/l3_test_report/. /tmp/L3_TEST_RESULTS/ || echo "No results to copy"
          ls -l /tmp/L3_TEST_RESULTS || echo "No results directory found"

      - name: Set up Docker Buildx (for CI upload container)
        if: always()
        uses: docker/setup-buildx-action@v1
        with:
          install: true

      - name: Upload results to Orchestration Service
        if: always() && github.repository_owner == 'rdkcentral'
        run: |
          docker run \
            -e AUTOMATICS_UNAME=${{ secrets.AUTOMATICS_UNAME }} \
            -e AUTOMATICS_PASSCODE=${{ secrets.AUTOMATICS_PASSCODE }} \
            -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME \
            --name ci-container -d \
            ghcr.io/rdkcentral/docker-rdk-ci:latest tail -f /dev/null
          docker cp /tmp/L3_TEST_RESULTS ci-container:/tmp/L3_TEST_RESULTS
          docker exec -i ci-container bash -c "
            echo 'Contents in /tmp/L3_TEST_RESULTS' && ls -l /tmp/L3_TEST_RESULTS &&
            git config --global --add safe.directory /mnt/L2_CONTAINER_SHARED_VOLUME &&
            gtest-json-result-push.py /tmp/L3_TEST_RESULTS \
              https://rdkeorchestrationservice.apps.cloud.comcast.net/rdke_orchestration_api/push_unit_test_results \
              /mnt/L2_CONTAINER_SHARED_VOLUME/rdk-cert-config"
